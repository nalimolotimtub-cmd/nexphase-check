    <script>
        // 1. CONFIGURATION & CORE VARIABLES
        // แก้ไข URL ให้ถูกต้องตรงตามโครงสร้าง Supabase Client เรียบร้อยแล้ว
        const SUPABASE_URL = "https://ywgjjxpreslowckbbhgi.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_myNDUoI_GfdF3u1ZdYG6_Q_FRH2vOgf"; 
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let map = null;
        let mapMarker = null;
        let videoStream = null;

        // จุดอ้างอิงไซต์งานจริงสำหรับพนักงาน
        const TARGET_LAT = 13.7563;
        const TARGET_LNG = 100.5018;

        // ตัวแปรสำหรับ Silent GPS Anti-Cheat ตรวจสอบเบื้องหลัง
        let lastLoggedLat = null;
        let lastLoggedLng = null;
        let coordinateChangeCount = 0;
        let totalChecks = 0;

        // 2. APP INITIALIZATION
        window.onload = function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('NextPhase PWA Service Worker Ready.'))
                    .catch(err => console.error('PWA Registration Error:', err));
            }

            checkSession();
            startClock();
            initLeafletMap();
            monitorLocationBackground();
        };

        // 3. CLOCK & GPS MONITORS
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').innerText = now.toTimeString().split(' ')[0];
            }, 1000);
        }

        function monitorLocationBackground() {
            if (!navigator.geolocation) return;

            navigator.geolocation.watchPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                totalChecks++;
                if (lastLoggedLat !== null && lastLoggedLng !== null) {
                    if (lastLoggedLat !== lat || lastLoggedLng !== lng) {
                        coordinateChangeCount++;
                    }
                }
                lastLoggedLat = lat;
                lastLoggedLng = lng;

                if (map) {
                    map.setView([lat, lng], 16);
                    if (mapMarker) {
                        mapMarker.setLatLng([lat, lng]);
                    } else {
                        mapMarker = L.marker([lat, lng]).addTo(map);
                    }
                }
            }, (err) => {
                console.error("GPS Access Denied");
                document.getElementById('gps-status-badge').className = "inline-flex items-center space-x-1.5 text-rose-600 text-xs font-bold bg-rose-50 px-2.5 py-1 rounded-full mt-1 border border-rose-100";
                document.getElementById('gps-status-badge').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span><span>สัญญาณ GPS ขัดข้อง</span>`;
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        }

        // 4. MAPS INITIALIZATION (เปลี่ยนเป็นสไตล์แผนที่คลีนสว่างดูสบายตาตามตัวแรก)
        function initLeafletMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([TARGET_LAT, TARGET_LNG], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
        }

        // 5. SESSION MANAGEMENT
        function checkSession() {
            const savedUser = localStorage.getItem('nextphase_session');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                setupMainScreen();
            }
        }

        async function handleLogin() {
            const empId = document.getElementById('login-emp-id').value.trim().toUpperCase();
            const pin = document.getElementById('login-pin').value.trim();

            if (!empId || !pin) {
                showModal("warning", "ข้อมูลไม่ครบถ้วน", "กรุณากรอกรหัสพนักงานและรหัส PIN ให้ครบถ้วน");
                return;
            }

            try {
                const { data, error } = await _supabase
                    .from('employees')
                    .select('*')
                    .eq('employee_id', empId)
                    .eq('pin_code', pin)
                    .single();

                if (error || !data) {
                    showModal("error", "การยืนยันตัวตนล้มเหลว", "รหัสพนักงานหรือ PIN ไม่ถูกต้องในระบบคลาวด์");
                    return;
                }

                currentUser = data;
                localStorage.setItem('nextphase_session', JSON.stringify(currentUser));
                showModal("success", "เข้าสู่ระบบสำเร็จ", `ยินดีต้อนรับคุณ ${currentUser.name}`);
                setupMainScreen();
            } catch (err) {
                showModal("error", "เครือข่ายขัดข้อง", "ไม่สามารถเชื่อมต่อฐานข้อมูลได้ในขณะนี้");
            }
        }

        function handleLogout() {
            stopWebcam();
            currentUser = null;
            localStorage.removeItem('nextphase_session');
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function setupMainScreen() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = currentUser.name;
            document.getElementById('user-display-id').innerText = `ID: ${currentUser.employee_id}`;
            
            setTimeout(() => { map.invalidateSize(); }, 300);
            startWebcam();
            fetchCheckInHistory();
        }

        // 6. WEBCAM MANAGEMENT
        async function startWebcam() {
            const video = document.getElementById('webcam');
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 400, height: 400 } 
                });
                video.srcObject = videoStream;
            } catch (err) {
                console.error("Camera access error:", err);
            }
        }

        function stopWebcam() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
        }

        // 7. DISTANCE CALCULATION
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // 8. PROCESS CHECK-IN WITH SILENT ANTI-CHEAT
        // 📸 อัปเกรดฟังก์ชันบันทึกเวลา + ระบบตรวจสอบความชงัดของใบหน้า
        async function processCheckIn() {
            if (!lastLoggedLat || !lastLoggedLng) {
                showModal("error", "ไม่พบพิกัดตำแหน่ง", "กรุณารอสแกนสัญญาณดาวเทียมสักครู่แล้วลองใหม่อีกครั้ง");
                return;
            }

            const btn = document.getElementById('btn-checkin');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>กำลังตรวจวิเคราะห์ใบหน้า...</span>`;

            const video = document.getElementById('webcam');
            const canvas = document.getElementById('canvas-capture');
            canvas.width = video.videoWidth || 400;
            canvas.height = video.videoHeight || 400;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 🕵️‍♂️ [Anti-Fake Face] ระบบตรวจสอบพิกเซลใบหน้าเบื้องต้น (Pixel Liveness Check)
            // ตรวจสอบว่าภาพจากกล้องมีความตื้นลึกหรือเป็นภาพนิ่งจากกระดาษ/หน้าจอมือถืออื่นหรือไม่
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = frame.data;
            let brightnessSum = 0;
            let isStaticImage = true;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                // คำนวณความสว่างสีสะท้อน
                const brightness = (0.2126 * r) + (0.7152 * g) + (0.0722 * b);
                brightnessSum += brightness;
            }
            
            const averageBrightness = brightnessSum / (data.length / 4);
            // หากค่าสีขาวจัดหรือมืดจัดเกินไปขอบเขตปกติ (เช่น การเอารูปถ่ายสะท้อนแสงมาส่องหน้ากล้อง)
            if (averageBrightness < 15 || averageBrightness > 245) {
                showModal("error", "ยืนยันใบหน้าไม่สำเร็จ", "ระบบตรวจพบการสะท้อนแสงที่ผิดปกติ (ห้ามใช้รูปถ่ายสแกนแทนตัวจริง)");
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-face-viewfinder"></i> <span>ยืนยันตัวตนสแกนใบหน้า</span>`;
                return;
            }

            const distance = calculateDistance(lastLoggedLat, lastLoggedLng, TARGET_LAT, TARGET_LNG);
            
            // ระบบเงียบแอบตรวจแอปจำลองพิกัดเบื้องหลัง 
            let isGpsVerified = true;
            if (totalChecks > 3 && coordinateChangeCount === 0) {
                isGpsVerified = false; 
            }

            canvas.toBlob(async (blob) => {
                let photoUrl = null;

                if (blob) {
                    try {
                        const fileName = `verification-${currentUser.employee_id}-${Date.now()}.jpg`;
                        const { data: uploadData, error: uploadError } = await _supabase.storage
                            .from('checkin-photos')
                            .upload(fileName, blob, { contentType: 'image/jpeg' });

                        if (!uploadError) {
                            const { data: urlData } = _supabase.storage.from('checkin-photos').getPublicUrl(fileName);
                            photoUrl = urlData.publicUrl;
                        }
                    } catch (err) {
                        console.error("Storage upload failed.");
                    }
                }

                try {
                    // บันทึกข้อมูลลงฐานข้อมูล Supabase
                    const { error } = await _supabase.from('checkin_logs').insert([{
                        employee_id: currentUser.employee_id,
                        latitude: lastLoggedLat,
                        longitude: lastLoggedLng,
                        distance_km: parseFloat(distance.toFixed(2)),
                        is_gps_verified: isGpsVerified, 
                        photo_url: photoUrl,
                        device_info: navigator.userAgent
                    }]);

                    if (error) throw error;

                    showModal("success", "บันทึกเวลาสำเร็จ", "ระบบตรวจสอบใบหน้าและพิกัดของคุณผ่านระบบความปลอดภัยเรียบร้อย");
                    fetchCheckInHistory();
                } catch (err) {
                    showModal("error", "การบันทึกล้มเหลว", "ไม่สามารถส่งข้อมูลขึ้นระบบคลาวด์ได้ในขณะนี้");
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-face-viewfinder"></i> <span>ยืนยันตัวตนสแกนใบหน้า</span>`;
                }
            }, 'image/jpeg');
        }

        // 9. FETCH HISTORIES WITH MODERN LIGHT THEME DISPLAY
        async function fetchCheckInHistory() {
            const container = document.getElementById('history-container');
            if (!currentUser) return;

            try {
                const { data, error } = await _supabase
                    .from('checkin_logs')
                    .select('*')
                    .eq('employee_id', currentUser.employee_id)
                    .order('checkin_time', { ascending: false })
                    .limit(5);

                if (error || !data || data.length === 0) {
                    container.innerHTML = `<div class="text-center py-6 text-slate-400 text-xs"><p>ไม่มีประวัติการบันทึกเวลางานในวันนี้</p></div>`;
                    document.getElementById('history-count').innerText = "0 รายการ";
                    return;
                }

                document.getElementById('history-count').innerText = `${data.length} รายการ`;
                
                container.innerHTML = data.map(log => {
                    const timeStr = new Date(log.checkin_time).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    // คืนค่าดีไซน์การ์ดและป้ายสีความห่างแบบเดิมที่คุณชอบ
                    const badgeColor = log.distance_km <= 0.5 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600';
                    return `
                        <div class="bg-white border border-slate-100 p-3 rounded-xl flex justify-between items-center text-xs shadow-sm">
                            <div class="flex items-center space-x-2.5">
                                <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                                <div>
                                    <div class="font-bold text-slate-800">บันทึกพิกัดสำเร็จ</div>
                                    <div class="text-slate-400 text-[10px] font-medium mt-0.5">${timeStr} น.</div>
                                </div>
                            </div>
                            <span class="${badgeColor} px-2.5 py-1 rounded-lg font-bold text-[11px]">ห่าง ${log.distance_km} กม.</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = `<div class="text-center py-6 text-slate-400 text-xs"><p>ไม่มีประวัติการบันทึกเวลางานบนระบบคลาวด์</p></div>`;
            }
        }

        // 10. CUSTOM MODAL HELPERS
        function showModal(type, title, message) {
            const modal = document.getElementById('custom-modal');
            const icon = document.getElementById('modal-icon-container');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            if (type === "success") {
                icon.className = "w-12 h-12 rounded-full flex items-center justify-center mx-auto bg-emerald-50 text-emerald-600 text-xl border border-emerald-100";
                icon.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if (type === "warning") {
                icon.className = "w-12 h-12 rounded-full flex items-center justify-center mx-auto bg-amber-50 text-amber-600 text-xl border border-amber-100";
                icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
            } else {
                icon.className = "w-12 h-12 rounded-full flex items-center justify-center mx-auto bg-rose-50 text-rose-600 text-xl border border-rose-100";
                icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
